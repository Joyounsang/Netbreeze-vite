<script>
	(function () {
		'use strict';

		// user-global-chat 초기화
		function initUserGlobalChat() {
			const $chatContainer = $('.user-global-chat');
			const $root = $chatContainer.length ? $chatContainer : $(document);

			initAttachMenuActions($root);
			initTextarea($root);
		}

		// 첨부 메뉴 액션 처리
		function initAttachMenuActions($container) {
			const $fileActionBtns = $('.custom-select.added .settings-menu-item[data-action="file"]');

			$fileActionBtns.off('click.file-attach').on('click.file-attach', function (e) {
				e.preventDefault();
				e.stopPropagation();

				// 1) 현재 버튼과 같은 li 안의 input 우선 사용
				let $fileInput = $(this).closest('li').find('.file-attach-input').first();

				// 2) dropdown이 body로 포털된 경우, anchorButton을 통해 원래 attach에서 탐색
				if (!$fileInput.length) {
					const $anchorButton = $(this).closest('.settings-dropdown').data('anchorButton');
					if ($anchorButton && $anchorButton.length) {
						$fileInput = $anchorButton.closest('.attach').find('.file-attach-input').first();
					}
				}

				if ($fileInput.length) {
					$fileInput[0].click();
				}
			});
		}

		// textarea 입력 처리
		function initTextarea($container) {
			$container.find('textarea').on('input', function () {
				const val = $(this).val().trim();
				const $sendBtn = $container.find('.command .send');

				if (val.length > 0) {
					$sendBtn.addClass('active');
				} else {
					$sendBtn.removeClass('active');
				}
			});
		}

		// 하단 액션(맨 아래로 / 답변 중): 스크롤이 최하단일 때 숨김, 위로 올린 경우에만 표시
		function initBottomActionUiByScroll($chatContainer) {
			const $bottomUi = $chatContainer.find('.bottom-action-ui');
			if (!$bottomUi.length) {
				return;
			}

			const $scrollPanel = $chatContainer.closest('.panel');
			if (!$scrollPanel.length) {
				return;
			}

			const $contentView = $chatContainer.closest('.content-view');
			const thresholdPx = 48;

			function isScrollAtBottom(el) {
				const gap = el.scrollHeight - el.scrollTop - el.clientHeight;
				return gap <= thresholdPx;
			}

			function update() {
				const el = $scrollPanel[0];
				$bottomUi.toggleClass('is-pinned-bottom', isScrollAtBottom(el));
			}

			$bottomUi.find('.scrollDown').off('click.scrollToBottom').on('click.scrollToBottom', function (e) {
				e.preventDefault();
				const el = $scrollPanel[0];
				const maxScroll = Math.max(0, el.scrollHeight - el.clientHeight);
				$scrollPanel.stop(true).animate({ scrollTop: maxScroll }, 300, 'swing', function () {
					update();
				});
			});

			$scrollPanel.off('scroll.bottomActionUi').on('scroll.bottomActionUi', update);
			$(window).off('resize.bottomActionUi').on('resize.bottomActionUi', update);

			if ($contentView.length && typeof ResizeObserver !== 'undefined') {
				const prevRo = $chatContainer.data('bottomActionResizeObserver');
				if (prevRo && typeof prevRo.disconnect === 'function') {
					prevRo.disconnect();
				}
				const ro = new ResizeObserver(function () {
					update();
				});
				ro.observe($contentView[0]);
				$chatContainer.data('bottomActionResizeObserver', ro);
			}

			if ($contentView.length && typeof MutationObserver !== 'undefined') {
				const prevMo = $chatContainer.data('bottomActionMutationObserver');
				if (prevMo && typeof prevMo.disconnect === 'function') {
					prevMo.disconnect();
				}
				const mo = new MutationObserver(function () {
					update();
				});
				mo.observe($contentView[0], { childList: true, subtree: true });
				$chatContainer.data('bottomActionMutationObserver', mo);
			}

			update();
			// scrollbar 등 다른 초기화 이후 레이아웃 반영
			setTimeout(update, 0);
			setTimeout(update, 200);
		}

		// 초기화 실행
		$(document).ready(function () {
			initUserGlobalChat();
			$('.user-global-chat').each(function () {
				initBottomActionUiByScroll($(this));
			});
		});
	})();
</script>
