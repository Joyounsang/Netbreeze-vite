<div class="filter-panel filter-calendar">
	<div class="date-range-calendar">
		<div class="date-range-calendar-head">
			<div class="date-range-presets">
				<button type="button" class="range-preset-btn" data-range="7d">7일</button>
				<button type="button" class="range-preset-btn" data-range="1m">1개월</button>
				<button type="button" class="range-preset-btn" data-range="3m">3개월</button>
				<button type="button" class="range-preset-btn active" data-range="custom">사용자
					정의</button>
			</div>
		</div>
		<div class="date-range-calendar-body">
			<div id="date-range-start"></div>
			<div id="date-range-end"></div>
		</div>
		<div class="date-range-calendar-foot">
			<div class="selected-range-text" id="selected-range-text">선택된 기간이 없습니다.</div>
			<a href="#" class="btn positive fill">적용</a>
		</div>
	</div>
</div>
