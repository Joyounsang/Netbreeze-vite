<!-- 채팅설정 팝업 -->
<div id="mdChatSetting" class="modal">
	<div class="modal-inner">
		<div class="modal-header">
			채팅 설정
			<a href="#" class="modalClose" title="닫기">닫기</a>
		</div>

		<div class="modal-body" style="min-width: 300px;">
			<div class="table-simple">
				<table>
					<tbody>
						<tr>
							<th>
								<label for="" class="basic-text">업무형 톤</label>
							</th>
							<td class="right">
								<select>
									<option>정확/간결</option>
								</select>
							</td>
						</tr>
						<tr>
							<th>
								<label for="" class="basic-text">길이</label>
							</th>
							<td class="right">
								<select>
									<option>보통</option>
								</select>
							</td>
						</tr>
						<tr>
							<th>
								<label for="" class="basic-text">위주</label>
							</th>
							<td class="right">
								<select>
									<option>단락 위주</option>
								</select>
							</td>
						</tr>
						<tr>
							<th>
								<label for="" class="basic-text">근거 우선</label>
							</th>
							<td class="right">
								<label class="switch">
									<input type="checkbox" id="switch">
									<span class="slider"></span>
								</label>
							</td>
						</tr>
					</tbody>
				</table>
			</div>
		</div>

	</div>
	<div class="modal-dim"></div>
</div>
