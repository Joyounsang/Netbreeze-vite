<!-- slide-controls : 슬라이드 공통 UI (progress, fraction, prev/next) -->
<div class="slide-controls">
    <div class="slide-progress" data-slide-progress role="presentation"></div>
    <p class="slide-fraction" data-slide-fraction aria-live="polite">1/5</p>
    <div class="slide-nav">
        <button type="button" class="slide-nav__btn slide-nav__btn--prev" aria-label="이전 슬라이드"></button>
        <button type="button" class="slide-nav__btn slide-nav__btn--next" aria-label="다음 슬라이드"></button>
    </div>
</motion.div>
