<!DOCTYPE html>
<html lang="ko">
<include src="src/includes/head.html"></include>

<body>
	<div class="viewport">
		<div class="container">
			<div class="contents">
				<div class="login login-container type-join">
					<div class="form">
						<div class="form-inner">
							<div class="service-title">
								<img src="assets/images/sk/logo.png" alt="SK Broadband logo" style="width: 44px;">
								<div class="title">
									회원가입
								</div>
								<ul class="join-step-guide">
									<li class="complete">
										<div class="status">1</div>
										<span>학교정보</span>
									</li>
									<li class="line"></li>
									<li class="on">
										<div class="status">2</div>
										<span>관리자 계정</span>
									</li>
									<li class="line"></li>
									<li>
										<div class="status">3</div>
										<span>가입상품</span>
									</li>
									<li class="line"></li>
									<li>
										<div class="status">4</div>
										<span>가입완료</span>
									</li>
								</ul>
							</div>

							<form>
								<div class="form-row">
									<div class="input-item">
										<label for="" class="like-label">
											<span>관리자 ID<em class="red">*</em></span>
										</label>
										<div class="input-item-inner justify default">
											<input type="text" placeholder="관리자 아이디를 입력해 주세요">
											<a href="#" class="btn secondary" style="max-width: 100px;">중복확인</a>
										</div>
										<div class="input-item-inner">
											<p class="input-text guide success">
												6자 이상 20자 이하의 영문 혹은 영문과 숫자 조합
											</p>
										</div>
										<div class="input-item-inner">
											<p class="input-text guide error">
												특수문자(공백 제외) 사용이 불가합니다.
											</p>
										</div>
									</div>

									<div class="input-item">
										<label for="" class="like-label">
											<span>휴대폰 번호<em class="red">*</em></span>
										</label>
										<div class="input-item-inner justify default">
											<div class="input-stepNum">
												<input type="text" placeholder="">
												<input type="text" placeholder="">
												<input type="text" placeholder="">
											</div>
											<a href="#" class="btn secondary" style="max-width: 100px;">중복확인</a>
										</div>
										<div class="input-item-inner">
											<p class="input-text guide error">
												올바른 10자리 사업자 번호를 입력해 주세요.
											</p>
										</div>
									</div>
								</div>
								<div class="form-row">
									<div class="input-item">
										<label for="" class="like-label">
											<span>비밀번호<em class="red">*</em></span>
										</label>
										<div class="input-item-inner">
											<input type="password" placeholder="비밀번호를 입력해 주세요">
										</div>
										<div class="input-item-inner">
											<p class="input-text guide success">
												최소 10자 이상의 비밀번호를 입력해 주세요.
											</p>
										</div>
										<div class="input-item-inner">
											<p class="input-text guide error">
												영문 / 숫자 / 특수문자(공백 제외, @, #, ! 단일 허용)를 포함해 주세요.
											</p>
										</div>
									</div>

									<div class="input-item">
										<label for="" class="like-label">
											<span>비밀번호 확인<em class="red">*</em></span>
										</label>
										<div class="input-item-inner">
											<input type="password" placeholder="비밀번호를 다시 입력해 주세요">
										</div>
										<div class="input-item-inner">
											<p class="input-text guide success">
												동일한 비밀번호를 입력해 주세요.
											</p>
										</div>
									</div>
								</div>
							</form>

							<div class="form-cta">
								<div class="cta-group">
									<a href="sk-join-step01.html" class="btn white line">이전화면</a>
									<a href="sk-join-step03.html" class="btn positive fill">다음</a>
								</div>
							</div>

						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
	</div>
</body>

</html>
