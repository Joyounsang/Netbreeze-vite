<!DOCTYPE html>
<html lang="ko">
<include src="src/includes/head.html"></include>

<body>
	<div class="viewport">
		<div class="container">
			<div class="contents">
				<div class="login login-container">
					<div class="form">
						<div class="form-inner">
							<div class="service-title">
								<img src="assets/images/sk/logo.png" alt="SK Broadband logo" style="width: 44px;">
								<div class="title">
									회원 정보 찾기
								</div>
								<div class="tab-login">
									<ul>
										<li>
											<a href="sk-findid.html">아이디 찾기</a>
										</li>
										<li class="on">
											<a href="sk-findpw.html">비밀번호 찾기</a>
										</li>
									</ul>
								</div>
							</div>

							<form>
								<div class="input-item">
									<label for="" class="like-label">
										<span>비밀번호 입력</span>
									</label>
									<div class="input-item-inner">
										<input type="password" placeholder="새로운 비밀번호를 입력해 주세요">
									</div>
								</div>

								<div class="input-item">
									<label for="" class="like-label">
										<span>비밀번호 확인</span>
									</label>
									<div class="input-item-inner">
										<input type="password" placeholder="동일한 비밀번호를 다시 입력해 주세요">
									</div>
									<div class="input-item-inner">
										<p class="input-text guide error">최소 10자 이상의 비밀번호를 입력해 주세요.</p>
									</div>
									<div class="input-item-inner">
										<p class="input-text guide success">영문 / 숫자 / 공백 제외 / 특수문자 (! @ # $ % ^ & *)를 포함해 주세요.</p>
									</div>
								</div>
							</form>

							<div class="form-cta">
								<div class="input-item">
									<div class="input-item-inner">
										<a href="sk-login.html" class="btn positive fill">설정 완료</a>
									</div>
									<div class="input-item-inner">
										<a href="sk-login.html" class="btn white line">이전화면</a>
									</div>
								</div>
							</div>
						</div>
					</div>
				</div>
			</div>
		</div>
	</div>
</body>

</html>
